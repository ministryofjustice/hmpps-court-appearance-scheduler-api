      person.court-appearance.completed:
        $ref: '#/components/messages/person.court-appearance.completed'
      person.court-appearance.expired:
        $ref: '#/components/messages/person.court-appearance.expired'
      person.court-appearance.recategorised:
        $ref: '#/components/messages/person.court-appearance.recategorised'
      person.court-appearance.recorded:
        $ref: '#/components/messages/person.court-appearance.recorded'
      person.court-appearance.relocated:
        $ref: '#/components/messages/person.court-appearance.relocated'
      person.court-appearance.requested-by-video-link:
