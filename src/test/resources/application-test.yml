server:
  shutdown: immediate

management.endpoint:
  health.cache.time-to-live: 0
  info.cache.time-to-live: 0

integration:
  hmpps-auth:
    url: "http://localhost:8090/auth"

spring:
  jpa:
    show-sql: true
    properties:
      hibernate.generate_statistics: true
  datasource:
    hikari:
      data-source-properties:
        sslmode: 'disable'

client:
  id: court-appearance-scheduler
  secret: court-appearance-scheduler

db:
  server: "localhost:5432"
  name: "appearance"
  user: "court"
  pass: "5ch3du13r"

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    version: 5.32.1

hmpps.sqs:
  provider: localstack
  queues:
    hmppseventtestqueue:
      queueName: ${random.uuid}
      dlqName: ${random.uuid}
      subscribeTopicId: hmppseventtopic
    hmppsdomaineventsqueue:
      queueName: ${random.uuid}
      dlqName: ${random.uuid}
      subscribeTopicId: hmppseventtesttopic
  topics:
    hmppseventtopic:
      arn: arn:aws:sns:eu-west-2:000000000000:${random.uuid}
    hmppseventtesttopic:
      arn: arn:aws:sns:eu-west-2:000000000000:${random.uuid}
