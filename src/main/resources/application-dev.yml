integration:
  hmpps-auth:
    url: "https://sign-in-dev.hmpps.service.justice.gov.uk/auth"
  court-register:
    url: "https://court-register-api-dev.hmpps.service.justice.gov.uk"
  manage-users:
    url:  "https://manage-users-api-dev.hmpps.service.justice.gov.uk"
  nomis-migration:
    url: "https://prisoner-nomis-migration-dev.hmpps.service.justice.gov.uk"
  prison-register:
    url: "https://prison-register-dev.hmpps.service.justice.gov.uk"
  prisoner-search:
    url: "https://prisoner-search-dev.prison.service.justice.gov.uk"
  remand-and-sentencing:
    url: "https://remand-and-sentencing-api-dev.hmpps.service.justice.gov.uk"

service:
  active-prisons: "***"
  domain-events:
    poll-interval: PT10s
  ui-base-url: "https://court-appearance-scheduler-ui-dev.hmpps.service.justice.gov.uk"
  api-base-url: "https://court-appearance-scheduler-api-dev.hmpps.service.justice.gov.uk"
  appearance-expiration:
    cron: "0 0 7 * * *"
  reconciliation:
    cron: "0 0 17 * * *"

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true