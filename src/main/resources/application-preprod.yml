integration:
  hmpps-auth:
    url: "https://sign-in-preprod.hmpps.service.justice.gov.uk/auth"
  court-register:
    url: "https://court-register-api-preprod.hmpps.service.justice.gov.uk"
  manage-users:
    url: "https://manage-users-api-preprod.hmpps.service.justice.gov.uk"
  nomis-migration:
    url: "https://prisoner-nomis-migration-preprod.hmpps.service.justice.gov.uk"
  prison-api:
    url: "https://prison-api-preprod.prison.service.justice.gov.uk/api"
  prison-register:
    url: "https://prison-register-preprod.hmpps.service.justice.gov.uk"
  prisoner-search:
    url: "https://prisoner-search-preprod.prison.service.justice.gov.uk"
  remand-and-sentencing:
    url: "https://remand-and-sentencing-api-preprod.hmpps.service.justice.gov.uk"

service:
  active-prisons: "***"
  domain-events:
    poll-interval: PT1s
  ui-base-url: "https://court-appearance-scheduler-ui-preprod.hmpps.service.justice.gov.uk"
  api-base-url: "https://court-appearance-scheduler-api-preprod.hmpps.service.justice.gov.uk"
  appearance-expiration:
    cron: "0 0 7 * * *"
  reconciliation:
    cron: "0 0 17 * * 1-4"
  enhanced-reconciliation:
    cron: "0 0 17 * * 5"