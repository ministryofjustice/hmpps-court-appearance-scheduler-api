---
# Per environment values which override defaults in hmpps-court-appearance-scheduler-api/values.yaml

generic-service:

  ingress:
    host: court-appearance-scheduler-api-dev.hmpps.service.justice.gov.uk

  env:
    SPRING_PROFILES_ACTIVE: dev
    SENTRY_ENVIRONMENT: dev

  allowlist:
    kmpg: 195.68.59.74
    groups:
      - digital_staff_and_mojo
      - moj_cloud_platform

generic-prometheus-alerts:
  businessHoursOnly: true
  alertSeverity: move-and-improve-alerts-non-prod
  rdsAlertsDatabases:
    cloud-platform-674d9212cb232070: "Court Appearance Scheduler DB"
  rdsAlertsConnectionThreshold: 130
  sqsOldestAlertQueueNames:
    - "hmpps-court-appearance-scheduler-dev-domain_events_queue"
  sqsAlertsOldestThreshold: 10
  sqsNumberAlertQueueNames:
    - "hmpps-court-appearance-scheduler-dev-domain_events_dlq"
  sqsAlertsTotalMessagesThreshold: 1
  applicationCronJobStatusFailedWindowMinutes: 15
